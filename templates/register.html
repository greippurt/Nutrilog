{% extends "base.html" %}
{% block title %}Register – Nutrilog{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h3 class="card-title mb-4 text-center">Create account</h3>

        <form method="POST" action="/register">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" required autofocus autocomplete="name">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autocomplete="email">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required minlength="6" autocomplete="new-password">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm password</label>
            <input type="password" name="confirm" class="form-control" required minlength="6" autocomplete="new-password">
          </div>
          <div class="mb-3">
            <label class="form-label">Sex</label>
            <select name="sex" class="form-select" required>
              <option value="" disabled selected>Select…</option>
              <option value="female">Female</option>
              <option value="male">Male</option>
              <option value="children">Children</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" name="age" class="form-control" min="1" max="120" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Weight (kg)</label>
            <input type="number" name="weight_kg" class="form-control" min="1" step="0.1" required>
          </div>
          <button type="submit" class="btn btn-success w-100">Create account</button>
        </form>

        <p class="text-center text-muted mt-3 mb-0 small">
          Already have an account? <a href="/login">Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
